version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: kurchu_crm_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kurchu_crm
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
